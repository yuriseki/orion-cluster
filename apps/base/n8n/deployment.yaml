apiVersion: apps/v1
kind: Deployment
name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      # securityContext:
      #   fsGroup: 1000 # node group ID
      #   runAsUser: 1000 # node user ID
      #   runAsGroup: 1000 # node group ID

      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.10.2
          ports:
            - containerPort: 5678
              protocol: TCP

          envFrom:
            - configMapRef:
                name: n8n-configmap
            - secretRef:
                name: n8n-container-env

          securityContext:
            allowPrivilegeEscalation: false

          # volumeMounts:
          #   - mountPath: "/var/lib/postgresql/data"
          #     name: db-storage
              
      restartPolicy: Always

      # volumes:
      #   - name: db-storage
      #     persistentVolumeClaim:
      #       claimName: n8n-db-storage-pvc
